name: Staging Pipeline CI / CD

on:
  pull_request:
    branches:
    - staging
  push:
    branches:
    - ci-test

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Install node
      uses: actions/setup-node@v4
      with:
        node-version: '24'
    - name: Install dependencies
      run: npm install
    - name: Generate prisma client
      run: npx prisma generate
    - name: Build project
      run: npm run build
    - name: Login to Github Package
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GHP_TOKEN }}

    - name: Build and push migration image
      uses: docker/build-push-action@v7
      with:
        context: "."
        file: Dockerfile.migrate
        push: true
        tags: ghcr.io/${{ github.actor }}/backend-nestjs-migrate:${{ github.sha }} 
    - name: Build and push production image
      uses: docker/build-push-action@v7
      with:
        context: "."
        file: Dockerfile.backend
        push: true
        tags: ghcr.io/${{ github.actor }}/backend-nestjs:${{ github.sha }} 
  
  tag:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Login to Github Package
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GHP_TOKEN }}
    - name: Pull image from Github Package
      run: docker pull ghcr.io/${{ github.actor }}/backend-nestjs:${{ github.sha }}
    - name: Tag image with staging tag
      run: docker tag ghcr.io/${{ github.actor }}/backend-nestjs:${{ github.sha }} ghcr.io/${{ github.actor }}/backend-nestjs:staging
    - name: Push staging image to Github Package
      run: docker push ghcr.io/${{ github.actor }}/backend-nestjs:staging
